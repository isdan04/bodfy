                title: "SOSÁN",
                content: `
                Sin papá, la historia de la familia sería muy diferente, siempre hay un cómplice en el matrimonio, alguien que respalde y proteja, que no se raje. Para mi mamá, ese hombre fué Don Manuel, mas conocido en el bajo mundo del salitre, el chamizo y los drenes, como el "Bosam Sisiboqui". Apodo en dialecto mayo que significa "Bolsa de Fierro". Un bicho raro, nunca he conocido un hombre con tal libertad y desprendimiento. Si  mamá quería conectarnos al mundo papá cortaba los cables. Trabajador incansable por mas de 70 años, sin horarios, sin oficina, sin patrón, sin vicios. Jamás durmió fuera de la casa. Nunca se desveló, salvo por trabajo o sus hijos. Con solo primaria, anclado en un ejido, rodeado de algodón, trigo y maíz. Un tipo sin calendario. Llegó a este mundo con la revolución mexicana, pisó tierras de nativos milenarios, ¡1,000 años!  Para él no había días festivos ni fines de semana, ¡Qué gran enseñanza para los Godínez enjaulados de hoy! Algunos Boomers y Millenials dirán ¡Que aburrido! pero si eres astuto pensarás ¿Es posible ese lujo personal?.

Papá me enseñó lo que el mundo ha perdido. La belleza de la soledad, un hablar sin adornos, romper ataduras y cánones sociales ¡Sí!, asi es, ¿Lo notaron?, era un estoico susurrando a tu oído. Sosán del monte Sikóng. Místico. Mudo. Innato. Tan natural que ni el mismo lo sabía. No conocía la palabra filosofía y ahí residía su grandeza. Es una rara combinación de LaoTsé y los griegos. El me hizo filósofo. Se lo debo al viejo chori. Un bicho raro. Difícil de leer. Mamá era fácil, ella era una manifestación del mundo. Papá, un misterio. Lo percibía cuando lo llevaba, en su vochito verde, al Oraba. En casa lo volvía loco el entorno, pero en el vocho, en las tierras, en la naturaleza, se asomaba el gran hombre que fue ¡Qué afortunados somos los que vimos su misterio!.  Yo lo quise mucho. Lo extraño, fue mi primer amigo. Mamá me esculpió. Él me transformó. Jamás habló de Dios. Gracias a él lo encontré. En el vocho rumbo al Júpare, yo manejaba y él dormía. Entrelazaba sus manos. Respiraba sin ruido. No dormía. Algo sucedía. Tardé en verlo. Un aura de paz ¿El capacete, lo arropaba? Bajaba las revoluciones al motor. Ansiaba que ese momento durara más. Dejaba sonar el radio. Buscaba un camino sin permanente para no perturbarlo. Hace veinte años me empezó a pasar lo mismo, dicen los gurús hindúes que se hereda. Lo empiezo a creer. Es transformador.

Por otro lado, aparte de supertrabajador, ordenado y  megadisciplinado, era un grosero extremo. Mamá decía que tenía boca de infierno. Un día, se agarraron del moco y papá gritó desde el patio: "Les voy a tirar un violín por la ventana". Mamá me preguntó: ¿Que es eso, Rodolfo? Fingí demencia, era mejor callar. Lo que mas me divertía del Jefe es que se reía de mis locuras, no le asustaba que escuchara Heavy Metal, cortara camisetas o usara shorts. Que vistiera como cholo, me rapara o tatuara. Nomas agarraba cura. Recuerdo que decía: "Me gusta la música del Pito, le voy a poner un estéreo al carro". Mamá mostraba su cara bipolar, una mueca entre enojo y risa pícara contenida ¡Estaban curados mis viejos!. 

No le gustaban las plantas de la casa, las cuidaba por mamá pero a disgusto. Me ponía a regar, podar las matas, cortar el césped. Para eso, me daba un machete que tenía como cien años, envuelto hasta el mango con sus adoradas camisetas agujereadas ¡Inventó la camiseta eólica! Era un machete sin filo y todo oxidado, terminaba todo ampollado, me exigía un buen trabajo, cualquier basurita pedía que la juntara. Mamá, me pidió un día que matara el guajolote. Lo tenía engordando en la piocha del patio trasero ¡Y papá sacó el maldito machete amellado! Pobre güíjolo, lo emborraché con vino y ya que andaba como Jorge en el "Bucanero", le tuve que dar como 10 machetazos porque ¡El pinchi machete no cortaba! Le molí a golpes el buche y terminé bañado en sangre ¿Y papá? ¡Riéndose de mí!.

¿Sabían que el Bolsadefierro tenía un sentido estético y de orden inaudito? algunos lo señalan  erradamente como "idioso" pero andaban como a tres cuadras del desfile. La palabra correcta es meticuloso. No era él. Era su cerebro, sus circuitos neuronales interferían sus hemisferios, esa virtud lo hizo diferente y tal rasgo fue lo que nos unió de por vida ¿Qué maravilla no? ¿Saben ustedes porque Juan era el discípulo que Cristo amaba? Cuando tenía como 85 años me dijo debajo de un mezquite: "Pero que batalla tu Pito, ya no puedo hacer las cosas bien, que lata ser así". Solo quería subirse al vocho sin salitre en los zapatos. No quería ensuciar el tapete. No podía sacudirlos, me dispuse a ayudarlo. Había una manía en el, ya empezaba a sufrir por ello. Parecía perfeccionismo ¿Quizá estética? Pulcritud. Escrúpulo ¿Por qué los bordos de riego debían ser uniformes? ¿Había alguna armonía que yo desconocía? Nunca lo supe, hasta mi madurez. La película "Mejor imposible" con Jack Nicholson, lo retrata de manera humorística. 

¡Como chinnngan! ¡Todos! Era su grito de guerra, su amor por la soledad le hacía protestar ante las fiestas y solo se calmaba cuando veía que prendían el carbón. Mamá decía: "Ya se le alzaron las orejas al lobo". La carne roja lo volvía loco, seguro se llevó a la tumba un millón de vacas fileteadas. De gran apetito. Se acercaba al asador  al estilo Chente Fox y Fidel Castro,  "Cenas y te vas". Cuando estaba en secundaria, mamá hacía tortillas de harina y me daba en el desayuno, antes de las 7 de la mañana. A mediodía llegaba y ya se habían acabado. Por meses mamá le alcahueteó a papá hasta que metí presión. Mamá lo delató ¡Papá se las robaba, las escondía en su vitrina y se las comía a escondidas en el limón! Hacía como si estuviera viendo el árbol  mientras engullía la tascari. Ahi lo caché con las manos en la masa. Era un vaquetón. Desde entonces, se empezó a mochar y ahora mi amá y yo éramos los alcahuetes. Nos fue bien un tiempo a mi y a mamá, lo sé porque  la Jefa dejó de decir: "Este hombre me quiere hacer la vida de cuadritos".

El Box era el deporte que le gustaba ver. El Sisiboqui se apasionaba ¡Le valía madre! Parecía niño chiquito ¡Se metía en la pelea! Recuerdo que una noche veíamos en la TV, de 4 patas marca Telefunken, la pelea de Pedroza vs Zárate por allá a finales de los 70s, cuando un round se puso intenso el viejo se empezó a levantar de la silla y a tirar ganchos y sabanazos. Imaginó que Zárate era el güero Cósarit en aquel dren. Ganó Pedroza. Papá repetió toda la semana: "Peeedrooozaaa". Mamá meneaba la cabeza, agitaba su dedo índice alrededor de la oreja, movía los labios sin articular y decía: "Está desconchiflado".

Una vez lo llevé al oftalmólogo y le preguntó: ¿Qué es lo que ve en ésta pared, señor? Papá le dijo: "Cagarruta de mosca". El doctor, extrañado, me preguntó: ¿Qué dice tu abuelo, muchacho? "Son puntos negros". Contesté. Palabras domingueras del Sisiboqui. La gente creía que papá era mi abuelo y esposo de Aidé, mi hermana. A mamá le decía: "Gela". A sus hijos: Elmer, "Cabeti". Beto, "Veneno". Jorge, "Boca de Bagre". Aidé,  "Mula Chara". Adriana, "Tapona". Pancho, "Caciano". Manuel, "Nico". Rolando, "Indio". Angelina, "Niña" y, a mi, "Topo".

Aborrecía que Elmer le dijera: "Papi, te quiero". Reprobaba con la cabeza y gruñía: "Cabrón tan jaretudo". Repelía a los mandilones. Sinónimo de inservible para su léxico. Tenía apodos para sus cuñados que mamá defendía con tanto ahínco ¡Alégale al ampayer! Era de alto calibre, no le ganabas una, por eso Caciano le regaló un llavero que decía: "El Código". Un día, se hizo análisis de sangre, salió fuera de rango en algo y rezongaba: ¿Qué saben esos doctores? ¡Están muy chiquitos! Relacionaba aptitud con  estatura. Mamá se divertía, señalando: "Mira Pito, ahí va el químico". Era cómica la escena. No creía en doctores. Arrojado. Era lo que él creía y punto. Esculpido en una pieza. Mi hermano, Elmer,  preocupado por su salud, lo llevaba al homeópata, le compraba una bolsa de chochos, se regresaba a México con la tranquilidad de cuidar a su genitor. Al otro día, papá las tiraba a la basura. Mamá lo regañaba. No hacía caso a nadie. Indómito. Mustang en la llanura, ¡Hiiiih! ¡Hiiiih!
¡Frrrttt! El pavimento, su pradera. Huatabampo, su matorral. ¡Áyuuu, Silver!.

Sus cosas no las podías tocar, era letal su embestida. Se encabronaba. La manguera del agua debía tener diez vueltas, no ensuciarse ni gotear. El boiler superoxidado tenía un marro aplastando el botón del piloto. Una vez lo moví para curiosear como funcionaba y me quemé las pestañas, dejaron de decirme el "Pixie". Era una falta grave tocar su ropa, comida, enseres ¡Todo!  Recuerdo los periódicos y el abanico que metía al lavabo para darse un baño de tres yemas. Las viejísimas chanclas amarradas con trapos deshilachados. El bate de beisbol infantil en lugar de bastón. La crema nivea que lo hacía brillar como bola de billar ¿Por qué se ponía puntos y paseaba por la casa? El memorable, inseparable y "Cuidado con el perro, prohibido tocar" cubreasientos ¿De donde venía su gran valor? ¿Se lo regalaría la señora del mercado que le gustaba? Debe ser eso. Hormona mata neurona. Lo relajaba mas que el "Veganin". Su imprescindible sombrero de  "Los 4 vientos", el chorizo del "Diablo" , los chicharrones y chilorio del "Porky's", la "Cocacola"  o "Nestea". Su silla, tejida en la recámara para ver TV, era delito federal. Kameta se atrevía a sentarse para subir el cortisol. La usamos para novatear a Héctor con botas, esposo de mi sobrina Paty de botas, pero no mordió el anzuelo, queríamos que papá se enchilara. Fallamos esa vez. Héctor traía botas picudas para andar a tono con los sonorenses. Venía de México. "Estás montado al revés, Héctor", le dijo Rolando, cuando montó un caballo ¡Con razón lo veía tan cahetón! La lista prohibida sigue. El cepillo de dientes que lavaba con agua hirviendo y le enrollaba con papel de baño para guardarlo. Los galereños decían que papá le echaba agua hervida al radiador del tractor. No había zona desmilitarizada en la casa. La pila del lavadero era campo minado. Se convertía en "Hellboy" si te veía cerca de ella. Aparecía de repente entre los matorros del "Hazme como quieras", gritando con una voz muy gruesa y altos decibeles ¡Eiiit! ¿Quién está en la pila? ¡Uuujjjaaa! ¡Gela! ¿Pero que chingado? Se armaba el polvorín. ¡Oía todo! El chakra vishudda le repicaba. Kameta era un picahuyendo, lo desafiaba. Pero un día si se cagó de miedo. Se le aflojó el esfínter. Casi lo agarraba "in fraganti". Se lavana la cabeza en el lavadero. Lo ví correr de puntitas, en la oscuridad. Se escondió detrás del limón. Una ocasión le puse el dedo a papá con mi amá ¡El viejo estaba cortándose las uñas de los pies con una segueta! ¡Si! Leyeron bien ¡Una segueta para cortar fierro! tuve que tomar toronjil para bajar el PH. 

Si todos estudiamos y salimos a buscar futuro a las ciudades, se lo debemos a Evangelina. Estratégica. Visionaria. Y al respaldo del "Bolsasola", le decía Remberto. Pobre amigo, lo dejamos en la vil chía, nos regaló  su trabajo de medio siglo. Por eso vivimos bien y hasta Europa, Asia, Sudamérica y "Niú Jámchair" han viajado algunos ¿Y ahora los jóvenes no quieren casarse, comprar casa, tener hijos? Papá diría "Que gente tan ordinaria, ya se pelan, pué perico". 

Me tocó desayunar con el muchos años, me preguntaba con picardía desde que estaba en la "leperatoria": ¿A ver tú, Pito, cuántos huevos me he comido en toda mi vida? Le decía: "A ver, apá,  tienes 62 años, llevas 60 años comiendo 2 huevos diarios, entonces 60x365x2 son 43,800 huevos, papá". Soltába unas carcajadotas que hacía crispar los pelos de mi amá, quién hacía su mueca de disgusto, presumiendo  que había cosas mas importantes que atender ¡Era un buffet de risas esos desayunos! Mamé entre chispas y bastonazos salía de la cocina murmurando: "De que haya dos locos, mejor que haya uno". Se ponía a ver la TV Sony con control remoto, Pedroza ya estaba retirado, al igual que las teles patonas. 

Se asomaban los cambios de los 80s. Mi ancestro seguía impávido. El Judas Priest rasgaba el blues con "British steel". José José sacudió a la raza de bronce con su icónico "Secretos". Margaret Thatcher, espetaba que las Malvinas, al igual que sus tetas, eran intocables. ¿Y mi ancestro? sin derogaciones. Y así calculábamos los kilos de carne, litros de café y metros de chorizo que había engullido. Papá me enseñó que la vida es una broma del diablo, lo mejor es reírse de ese juego y Dios aparecerá de mil maneras. Alegría. Paz. Libertad. Siempre me pregunté ¿Que le pasa a mi amá si estamos tan felices desayunando? ¿Porque no se une a la fiesta? A la fecha, ronrronea en mi tatema la frase del Dr. Emmet Brown: "Voy a destruir ésta máquina infernal y estudiar el otro gran misterio del universo: La mujer".

Una vez nos tocó a Nico y a mí verlo pelear por el agua de riego en el poblado La Esquina. Papá había puesto sus costales en la compuerta del Oraba. Algo pasaba. No subía lo suficiente el nivel de agua para regar la tierra de la Mantapochy. Nico era el chofer, papá el copiloto y yo de mitotero. Era de noche. Fuimos a revisar compuertas. En una de ellas, papá encontró un joven girando la rueda del volante. Empezó el cotorreo. El intruso, un ingeniero de reciente egreso, le explicó a papá, que según la mecánica de fluidos, sí era posible regar ambas parcelas como el lo tenía ajustado. Todos sabemos que convencer al Jefe de jefes  estaba ¡Cabrón! El malnacido era un novato. Respetuoso pero insistente. Papá ya tenía 50 años siendo agricultor y en su gremio empírico se rumoraba que: "No le puedes enseñar rezos a un cura". El chilorio del "Porky's", taladraba en su cabeza ¡Dale en el hocico! Se dijeron de palabras. El malhechor con respeto y papá sin ceder un milímetro. Pasó un minuto. El chilorio perforó su cráneo ¡Quería salir! y el Bolsa gritó: ¡A mí enséñame a parir! Nico y yo nos asustamos. Fue un gritote, el bribón dejó todo como decía papá y se fue. Seguro terminó en un diván terapéutico. Papá, felizmente encabronado pudo regar sin problemas su cultivo. Se le bajó el chilorio. Pelear le despertaba el apetito. Cenó chicharrones del "Porky's" con tortillas de harineruca. 

Es admirable el trabajo de papá. Desde casa es imposible verlo ¿Por qué nuestra familia siempre estuvo solvente para realizar los sueños que ahora tenemos cumplidos?¿Por qué peleó con ese joven? ¿Por él, por mamá, o nosotros? Nunca le pregunté. El Bolsa trabajó sin cesar, peleó para ahuyentar a los malos, luchó en la adversidad, le picaron millones de abejas, ahuyentó víboras mientras comíamos en las tierras, salvó de un incendio al tractor, corrió un asesino del corral ¿Era Manuel sin miedo? Me hizo avioncitos con tule y espina, me enseñó a manejar con paciencia,  accedió a  rondar en su vocho las casas de las morras que me gustaban. Era mi alcahuete. Me dejó hacer cosas que mamá no permitía. Nunca me dió dinero para ir a la escuela o las fiestas y eso se lo agradezco porque me apartó de vanidades fútiles. Salía en la madrugada a checar el riego o rescatar a sus hijos de bailes para que no faltaran a la escuela. Cuidaba el chícharo de 7 a 7 solo con unos burritos y café en una pepsi puesta al sol ¡Había inventado el ayuno intermitente!.

A las mujeres les falta entender el entorno de muchos oficios masculinos, estar en casa no produce esa empatía. El Bolsa era un hombre sin modales, insensible al halago, que odiaba la mentira y decia: "Puro enredo ustedes". Esa frase por años me hizo preguntarme: ¿Por qué papá se enoja sin motivo? La respuesta llegó cuando Urano le dió media vuelta al sol. A mis 40 años lo entendí. Papá odiaba la mentira, el engaño y la manipulación ¿Entonces será cierto que los hombres son de Marte y las mujeres de Venus? ¿O era intransigente o indomable? ¿Who knows? Sabiamente, concluí: "No le rasques los huevos al tigre, déjalo ser tigre porque si le rascas, te embestirá".

Mamá era un glamour. En la prepa, me compraba agua de colonia "Sanborn's flor de naranja", con esa fragancia enamoré a Julieta. Fuimos pasión desbordante ¡Lo traen apergollado! bramaba Beto en Huatabampito, soltando su chispeante carcajada mientras tiraba una patada al aire para calentar el titanio ¡Si era frío ese fémur! Nos escribíamos cartas cada semana ¡Que románticas son las misivas! ¿Quizá sea la espera su magia? ¡Son una fábula! Aborrezco las redes sociales, le robaron a mis hijos el enorme hechizo de las cartas ¡Chinga tu madre, WhatsApp! Ella las perfumaba y yo las contestaba narrándole como eran mis días en la sultana del norte. En la universidad, esa esencia no fué suficiente para Genoveva, y mamá, empeñada en asegurar mi linaje, subió el presupuesto y me regaló "Jovan musk oil for man" ¡Uuufff! ¡Hasta los pelos en el pecho me salieron! A la hija de Nacho panocha la traía pisando algodón. Pero no todo lo que brilla es oro. Amor de lejos amor de pocos besos. Igual que mi primer amor, las cartas no entretejieron nuestros corazones. Y llegó el "Halston Z-14 after shave lotion". Me dió tres hijos ¿Pero como así? Preguntaría papá ¡Si estaba bien chiquita la botella! Era un imán !Un colisionador de hadrones! La Blanquita estaba noqueada. Se distraía. Reprobaba ¿La luna es de queso? Mamá no me compró el "Halston", pero me ayudaba a robárselo al Nico. Le sacábamos perfume con una jeringa. Mamá alcahueta, y muerta de la risa, me decía donde lo escondía ¡Era muy caro!, cosa fina. ¡Puro zapato picudo y camisa $8.50!, gritaba papá. Nora se lo había regalado, un aroma demasiado exquisito para un Buitre, las plumas no hacían su quimica, pero si fijaba en el PH del Tigre. Garras de Mauricio Garcés. Latin lover. ¡Gggrrrttt!, rugía mi felino interno. Cuando Blanquita despertó del hechizo estaba ida y de blanco en la Catedral de Hermosillo: "Los declaro marido y mujer", dijo el cura. ¡Gracias Nora, te debo mi prole! Nico jamás se enteró. Mamá se llevó el secreto a la tumba. ¡Perdón carnal! ¿Te transfiero?. De ahí en adelante, ya amarrada la Blanquita, puro "Obao" y jabón "Yaqui" ¿En cuál vas Omar? Te acabas de casar, estás a punto de pasar al "Obao". Pobre Ely y Marisela, seguro sus machos ya usan "Yaqui" ¡Futa madre!, diría Isabella, mi nieta. Tengo noticias sobrinos, Doña Eusebia ojos saltones se equivocó !El hombre no debe oler a zobaco y a tabaco! Los tiempos de tarzán ya pasaron, quiten las lianas de los mezquites.

                title: "TECATAZO",

El tío Rubén era un choteador. Divertido. Irreverente. Mordaz. Cuando pasaba Renecón, el mano de hule del pueblo, por la casa del tata Pancho, murmuraba: "Ahí va el cuerazo", se reía a hurtadillas con sus amigos. De semblante tranquilo, saludaba con respeto. Conversaba. Te estudiaba. Convivía. Buscaba un rasgo, maña o traspié. Lo encontraba y te emboscaba ¡Eras su presa! Espía del humor. Proscrito satírico. Héroe familiar. Era un gran tío. Todos tenemos algo de él. Fundó una escuela. Fuimos sus alumnos. Sus enseñanzas han llegado a cuatro generaciones. Parisito es su testimonio. En el año 2026, los BolGel ya suman ¡65 Fierritos!. 10 hijos, 27 nietos y 28 bisnietos. Jorge, mi hermano, se graduó con "Honoris causa". Subió el nivel al Everest ¡Es un profesional!, diría el tío Chayo. Una semana santa en  Huatson, George regañó a sus hijos en inglés. Subió la voz. Traía dólares de Arizona. Les dijo: ¡Hey you, líro Yorch and Yósep, no méén ay!. Sus hijos, Jorgito y José orinaban el limón ¡Shit! El Cochise college le enseño a masticar el inglés como ningún galereño. No le entendíamos ni papa pero estudiaba en Douglas, seguro su léxico era bueno. Con la primer cogotuda en la mano, cantaba "Mi piquito de oro" de Ramón Ayala, igualito que un gringo: "Jircóóómin, máiliro sígóóólpiiik. Jircóóómin, máiliro sígóóólpiiik" ¡De lengua me como tres tacos! Ya exaltado abría el megáfono y gritaba en inglés: ¡Aaayyy, aaayyy, aaayyy! Lo expulsaron del Cochise. Corrompía el idioma. Era un inglés mezclado con náhuatl de Coacalco y Yoreme del Equichopo ¡Bugna, gringos, fuck! Era políglota, tambien mascaba el dialecto mayo como chicle motita. Hay crónicas en las Mamias que una tarde, en el corral del primo Mayo Salazar, se comunicó en pársel con una cascabel: "ssshhhééécateee". Con la piel hizo una bolsa para Martha, incrustó la cabeza en la hebilla del cinto y sus nietas, Naomi y Beverly, agarraron el cascabel de sonaja. Sus vecinos dicen escuchar un siseo por las tardes: "ssshhhéééveee" ¡Expelliarmus!, conjura Martha.

Pero el tío Rubén tuvo sus reveses. No siempre se gana. Esa noche sí le dolió: ¡Me sacó el ojo, lo traigo en la mano!, rasgaba el aire con su voz. Despertó a todo el pueblo ¿Qué sucedió? Transcurría la década de 1950, Rubén gozaba sus veintes, era soltero, tiempo de  darle vuelo a la hilacha. Verano. Luna creciente. Una fiesta se celebraba en la Galera. La casa de Ventura Cózarit se llenó de alegría. Alguien se casaba. Música. Cerveza. Comida. Trajeron una  vitrola de manivela con discos "Peerles". Una canción por lado ¡El Spotify en goma de laca! Discos de Pedro Infante, Toña la negra y Los Panchos. El Rubiscano enseñaba la mazorca. La tía Lourdes aún no lo metía en cintura. Tomaba un trago a la tecate ¡Aaahhh!, se refrescaba. Palmeaba su barriga, se quitaba el sombrero y untaba con la mano su cabello. Se ponía el sombrero: ¿Y que dices, pues?, conversaba: ¿Y el Onésimo? ¿Vino? Hacía calor. Las tecates no debían calentarse. ¡Tómale, hombreee!, presionaba. El tío agarraba aviada. "Se quieren acabar toda la cerveza del mundo en un día, que bárbaro", diría mamá. Giran la manivela, crrr, crrr, crrr, la vitrola gira a 78 rpm. Colocan disco, ponen la aguja, shhh, shhh, shhh: "Amorcito corazón, yo tengo tentación, de un beeeso, que se prenda en el calor de nuestro gran amor, mi amooor". Los galereños se inflaron como guajolotes. Ese año, Pedro Infante se había presentado en el Casino de Huatabampo. Lugar exclusivo de Mirreyes, unos estirados que escupían por un colmillo. El pueblo rodeó el lugar aclamándolo y el ídolo del pueblo, como era su costumbre, demostró su humildad y cariño por los vecinos del río Mayo. Salió al balcón. Sonriente. Levanta su sombrero. !Ayyyy, ayyy, ayyy! ¡Arriba Huatabampo, donde se dan los hombres! ¡Arránquense muchachos, que no es mole de olla! La gente llegaba hasta la Iglesia de Cristo Rey: "Me canséee de rogaaarleee, me canséee de deciiirleee que yo sin eeella, de pena muerooo". Fué un furor de  vitoreos, coros y aplausos. Huatson rebasaba los diez mil habitantes ¡Que privilegio!.

Papá no fué a la fiesta del Yoreme Ventura porque no le gustaba el jolgorio. Aún no le pegaba sus madrazos al Güero Cózarit. Cuenta mamá que esa noche, merodeaba por el patio y el corral con una cachimba. Quería escuchar los "Peerles". Siempre le gustó Pedro Infante. Dibujaba una sonrisa de añoranza y júbilo cuando lo recordaba. En Huatabampo, veíamos sus películas en la Casa de las Palmeras. Yo era su chalán. La "Telefunken" era mi chamba. "Apá, va a empezar una película de Pedro Infante", le avisaba. "¡Ahhh, sí!, ¿Cuál?", volteaba interesado. "Los tres García", respondía. "Pué perico, ahí voy, no le cambies". El viejo era riguroso con su faena diaria pero le ganaba el fervor, se volvía loco un rato con tal de salir de su rutina. No era fácil para un sexagenario minucioso. Le pisaba a la chancla y pegaba corridas para todos lados. Iba a su cuarto y hacía algo. Corría al lavadero a quién sabe que. Finalmente traía su silla con tejido de canutillo beige y el cubreasientos rojo que Beto Botes le había regalado. Arrancaba la película. La veíamos en silencio. "Muévele a la antena", me indicaba cuando se cortaba o veía borrosa la pantalla. Me subía por las rejas de la ventana a rajamadres ¡Por ahí no, ujaaa!, tardaba en repeler. Giraba la antena hacía un lado ¿Ahi se ve bien?, le preguntaba. "A ver al ciego", iba a checar, "Dale pa'l otro lado", me indicaba. Movía la antena de nuevo, trataba de apuntar el pescado hacia la torre transmisora, era el truco. "A ver ahí". ¡Andhómbre!. Continuábamos con la función de la Época de oro del cine mexicano. Aparecía en pantalla "Continuamos enseguida". Eran anuncios. Papá movía la cabeza. Torcía la boca. Refunfuñaba. No le gustaban los comerciales, le cortaban la inspiración. Se levantaba al refri por un trago de coca y rondaba en la casa. "Ya empezó, apá", le avisaba de nuevo y venía trastabillando ¡Ujáaa, que lata, chingado! Se encartaba el viejo. A veces iba por él al lavadero o le chiflaba. Llegaba con un calcetín en la mano, lo volteaba y volvía a voltear. Era una manía ¡Tenía miles! Inofensivas, chistosas, infantiles. Cuando Pedro besaba a una mujer, papá se paraba de la silla, metía la mano a la bolsa del pantalón, movía la cabeza para atras emocionado y al roce de labios, exclamaba ¡Ájaaa! Esa escena lo cautivaba ¿Oye apá, es vieja ésta película?, le preguntaba. "Uuussshhh, es de los tiempos en que amarraban a los perros con chorizo y no se lo comían", respondía hilarante. 

Mientras nos peleábamos con la antena y papá le corría a los comerciales, mamá descansaba en la recámara frente al garage, sentada en su mecedora o acostaba en la cama ¿De verdad mamá dormía cinco minutos y se recuperaba? Siempre dudé. No era lo suyo dormir. Papá dormía mas en el catre que mamá en la cama. ¿La jarcia tenía melatonina o el colchón anfetaminas? Después de su siesta mamá se sentaba en la mecedora muy despeinada, ponía su pierna izquierda en una mesita. Reposaba su fractura. Agarraba el cepillo del buró y se peinaba. Movía los labios para matarse la comezón de la placa y miraba serenamente por la ventana ¿Que veía mamá con tanta atención? Nunca lo resolví ¿Que ves amá?, indagué mil veces. "Naaada, viendo pasar gente". No era cierto.  Nunca me engañó. Pensaba en sus hijos. Su mirada estaba en México, Laredo, Saltillo, Navojoa y Etchojoa ¡Un desparramadero de vástagos! ¿Se arrepentía de impulsarlos tanto? Su mirada era de ensueño ¿Planeaba un viaje? Anhelaba verlos. Era 1980. En la ventana se figuraba a Nico en la Narro, Elmer en el periférico, Jorge en un pozo petrolero, Adriana llevando las niñas a la escuela, Beto en la Volkswagen, Angelinita en el ITSON, Caciano en Barcel y Rolando en la escuela Bancaria. Aidé y yo no salíamos de Huatabampo, y a papá, su eterno enamorado, como a todos los tragones, lo había conquistado con el estómago ¡Poder femenino imbatible! ¿Que más podría pensar una madre?, ya era sexagenaria, sus alas, como las de Ícaro, se habían derretido. Pedro Infante divertía a papá y descansaba a mamá. "Béeesameee, bésame muuuchooo, como si fuera ésta noche, la úuultimaaa vez".

Regresemos a esa fiesta con Ventura Cózarit. El tio Rubén se había  desatado, sentía que podía montar un búfalo. Era medianoche. La vitrola no usaba pilas, había billete con los Cózarit ¡Hay que tomar aunque la familia sufra!, resollaba el tío con brío. Cada vez se palmeaba mas fuerte la barriga. Se empinaba el bote ¡Aaahhh!, se refrescaba ¡Tómenle, inservibles!, bramaba Rubén: ¡Onésimo, vente pa' acá con los hombres!, le gritaba. Mas cuerda a la manivela, crrr, crrr, crrr. "Siempre que te pregunnnto, qué cuáaando, cóoomo y dóoonde, tú siemmmpre me responnndes, quizás, quizás, quizás". Rubén cambió su semblante. Los Panchos lo enyerbaron. Quería romper la vitrola. Esa fué la pólvora. Rumiaba para sí: ¡Ábranla que vengo herido, no los vaya a ensangrentar! Sospecho que la Lourdes se hacía la difícil. A sus espaldas los millanes le pusieron el Alfalfa, porque lo cortaban cada mes. Raúl llegó al bodorrio. Un hombre serio. Formal. No fué por gusto, su hermano menor era imprudente, causaba problemas. La nana Socorro lo envió a vigilarlo. Se dirigió al anfitrión: "Buenas noches Ventura, ¿Como va la fiesta?. Raúl era tractorista, tenía familia. "Muy bien Barreras, ha bailado mucho la gente, ya regamos dos veces, tu hermano se ve contento". El joven Rubén andaba destornillado, sentía que podía comer balas, tirarse un pedo y matar un gato. ¡Onésimo, pa' que sirves tu cabrón!, lo embestía. Su voz era cada vez mas áspera, su risa mas burlesca. "¿Y el güero?, no lo veo", volteó el tío Raúl con Ventura. "Por ahí anda de curro, anda de volado con la Yori y guardó los huaraches. Ahora nomás quiere ¡Puro zapato picudo y camisa $8.50!, cree que tenemos dinero". El tío Raúl era un diplomático.

Dejemos a los tíos un momento  vayamos diez años adelante. Papá y el Guero Cózarit, el que se creía Yori, tuvieron un altercado !En éeesta esquiiina, pelearáaan! El Bolsa le debía unos ladrillos al Güero, le pidió prórroga y éste aceptó. El Yoreme la hacía de Chucho el Roto. Era sensible a la adulación. Unos galereños lo azuzaron. Lo emponzoñaron: "¿Por qué tienes que esperar?, tiene mucho dinero el Bosam sisiboqui, ¡Sácale la lana!", lo exaltaron las lenguas viperinas. Agarró valor y fué a buscarlo a la Mantapochi. Bufaba como toro. Traía la ponzoña. Usaba huaraches de nuevo. La Yori lo dejó vestido y alborotado. Ruina y frustración caminaban rumbo al Bolsa. Él no sabía. Era una tarde de marzo. Venía del Oraba con taspana al hombro. Mañana le soltaban el agua para el cártamo. Cruzó el canal "Libertad" por el tronco tendido cerca de la casa de Gervasio. El galereño  emponzoñado venía por la carretera y lo divisó. Papá bajó al dren del Tábare y el Güero igual. Se encontraron ¿Que pasó, Güero?, saludó papá. "Manuel, ¡Ocupo el dinero!", espetó. "¡Ehhh!, pero si ya quedamos que luego, tú, Güero". Se hicieron de palabras. Intercambiaron reproches. El vértigo se enardeció. El güero tiró primero. Papá metió el brazo y tiró la taspana. Quería una pelea justa. No era ágil el Bolsa, era fuerte. Corrioso. Paraba los golpes. Esperaba una oportunidad. Sabía que nomás ocupaba un moquetazo. No lograba acertar el Güero a pesar de ser mas alto. Papá era chaparro. Un tronco. No retrocedió ¡Zoooccc! Le reventó el pómulo. Papá recogió su taspana y dejó al güero atolondrado. El Yoreme era orgulloso. Corrió la noticia en La Galera que le había puesto una revolcada al Bolsa. Los yoremes se hincharon de soberbia ¡Chucho el Roto le partió la madre al rico del pueblo!, el Güero se  pavoneaba. El Bolsa no sabía. Un día, papá llevó a Gervasio, el Yoreme del Oraba, a La Galera. Se enteró del mitote y les cambió el relato. Había visto el pleito. Desde ese día, el Güero, rodeaba la casa del Bolsa con el ciópori arrugado, y salía por detrás de la casa de Felipón. El dinero de los ladrillos sirvieron para pagarle a Elmer su último hospedaje en la Casa Kino de Hermosillo. Iniciaba 1960. Rolando tenía un mes de nacido. Elmer traía la ventolera de irse a México. Momo Millán no tardaba en acercarse para exhibir su maliciosa envidia. El Bolsa libraría otra batalla. Verbal. Vomitiva. Con un cobarde y traicionero ¡Espere nuestro siguiente número! ¡Es semanal!.

Regresemos con Rubiscano. El joven Onésimo era callado. Prudente. Tolerante. Eso desafiaba a Rubén ¡Cuánto más se resisten más duro caen! Tenía tiempo hostigándolo. Nunca lo había hecho en público. Esa fué la mecha. Raúl vió la pólvora y se acercó a su hermano. Se puso a su derecha, Onésimo se hallaba a la izquierda de Rubén. El Yoreme era zurdo, sabía lo que hacía ¡Tómate una cerveza Raúl!. "Trabajo mañana temprano Rubén, no puedo, vámonos a la casa, ya es tarde". "¡Espérate hombre!, trabajas mucho hermano, quédate un rato". Onésimo veía el baile y volteaba de vez en cuando a verlos ¡Tómate un bote Onésimo!. "No, gracias, ya me tomé uno". El choteador fué azuzado. La sangre le subió a la cabeza ¡Sus venas hervían! Se había engorilado. El acoso acabó y arremetió: "¿¡Para que sirves tú, Onésimo!? ¡Yo, con una mano te tumbo, te revuelco y te tiro arriba de la casa de Ventura!", el tío movía la mano como si aventara un muñeco de trapo ¡Verdad que aaahhh! Nadie vió el misil. Onésimo se fué. Rubén se agarró de Raúl ¡Aaahhh, mi ojo!, se quejaba el tío sin quitar la mano de la cara ¡Mi ojo Raúl! ¡Me sacó el ojo el Onésimo!. "Te dije que te calmaras, vámonos para la casa", lo empujó Raúl ¡No, busca mi ojo, no lo traigo!. "¿Pero como te va a sacar el ojo?, pícale, ándale" ¡Que no lo traigo te digo, búscalo en el suelo! El choteador fue noquedo. El tío perdió el orgullo, pero conservó el ojo.

Durante los años '70s y '80s, papá visitaba con frecuencia a dos hermanos. En esos años me soltaba el vocho en las tierras. Yo era pochi. Apenas le alcanzaba a los pedales. Uno de los visitados era el tío Rubén. Nos recibía con gusto. Ésas décadas yo era pupilo y chafirete. Sisiboqui me enseñaba la vida. La soda y el pan del Tanny era mi tarifa. Aún recuerdo los aromas del mostrador y la vitrina del pan. Sisiboqui era un migrante absorto en sus pensamientos. Inadaptado. Añoraba su vida. Vivió cincuenta años rodeado de campos y ahora lo ahogaba el asfalto. Calles. Casas. Gente. ¿Papá viviendo en casas que parecían jonucos? La ilusión del joven es la nostalgia del viejo. Yo reía y el se contagiaba. Ocupaba risas para salir adelante. Nunca se adaptó ¡Llévenme a mi casa!, gritaba en sus últimos días.  "Estamos en la casa, papá", le explicaba Adriana. ¡Ésta no es mi casa!, reclamaba. La Galera era su aspiración, Huatabampo su aversión.

Regresemos a la milpa. "Aquí párate, Rolando, en el guamúchil, es por donde pueden entrar a robar, súbete al bordo para que veas mejor", le ordenó papá. Le  dió una cachimba, una caja de fósforos "Guerreros" y agua en el ánfora. "Si vienen a robar échales un grito fuerte para que crean que soy yo. Si entran animales a la siembra pégales en la crisma. Del Jumo no tengas pendiente, está herniado. Si ocupas algo vas con mi hermana la Monchi". Papá tenía aborrecido al Jumo, un Indio mayo vecino de su tierra, nunca supe porque. "Es muy malarreata", era todo lo que decía levantando la parte izquierda de su nariz para mostrar su disgusto. Un día, muchos años después, papá me contó que andaba checando la milpa, ya no tenía ayudantes, todos teníamos familias y habíamos migrado. Dijo que vió una nube negra muy rara que se movía muy cerca. Papá ya tenía  apagado un foco y no veía bien. Andaba arañando las ochenta primaveras. Nació en mayo. Era Tauro. Leal. Constante. Realista. Cuando ya era demasiado tarde, el viejo vió que era un enjambre lo que volaba ¡Se habían peleado las abejas reinas como el PRIAN y Morena en el Senado! Cuenta que lo envolvieron y le empezaron a picar por todos lados, aleteando los brazos se subió como pudo al vocho y arrancó al IMSS. El doctor  Reyes se moría de la risa cuando le dijo: ¡Millones doctor, eran millones! No le pasó nada pero mamá tuvo que sacar los aguijones. Y el Yoreme Jumo no le ayudó. 

Al Rolas le decíamos el Indio por ser, aparte de callado,  obstinado. Virtud férrea que estructuró su vida. Para él no había grises, su vista era del Oligoceno. Un mazorral con botas y bigote. Yoreme en la ciudad. Unión de mundos opuestos. Pacifista utópico. Estudiante reticente. Contador incansable. Cuando estaba en la prepa, metía una revista del "Llanero Solitario"  enmedio del cuaderno supergordo "Scribe" y hacía como que estudiaba. Por las noches dormía con su dinero bajo la almohada. Yo gateaba hasta su cama, metía la mano lentamente y le robaba algunas monedas. Me cacharon cuando le robé un billete grande a la Aidé. Estaba cebado, dijo la Gela. 

Esa noche dejamos al Indio en el guamúchil. Papá llegó con la tía Monchi. Había luna llena. El vocho aguardaba en el Nacapúl. Luego nos enfilamos rumbo a "Huatatlán". Papá manejaba el carro ¡Pero iba en chinguiza! ¡A rajamadres!, cosa rarísima en el Bolsa, como si fuera por la herencia. Veníamos por el bordo del canal dando tumbos como en la "Baja 1000". Antes de llegar al poblado la Esquina le pregunté: ¿Por qué vienes tan rápido apá?.  "Es que quiero que piensen que yo me quedé en las tierras y Rolando viene manejando". ¿Y eso por qué?. "Porque si se queda él saben que se va a dormir y le van a robar elotes". Por eso eran los gritotes del Bolsa a la mañana siguiente, le dimos dos vueltas a la milpa y no aparecía el "Indio nalgas de pescado". "Métete en los zurcos y búscalo, debe estar tirado durmiendo", me pidió. Yo tenía unos 13 años y era chaparrito, podía meterme entre los zurcos muy bien. Ya llevaba la mitad recorrida ¡Y que voy viendo unas botas picudas apuntando para arriba! ¡Eureka! ¡Aquí está!, le  grité a papá. Le puso una ¡Santa regañada de mil megatones! Lo encontró con la cruz a cuestas y mas coraje le dió al Bolsa. El "Indio nalgas de trailer hormiga", se había llevado unas pachitas en las botas pa'l desempance y lo  agarró en curva. Pero como dijo Jim Carrey en "La máscara": "Este tipo es incorregible". Era el tiempo de las correteadas nocturnas en Huatamburgo. El "Violetazo",  el "Copi de Chetumal"  y la "Zanja del maistro"  son historias censuradas, las usé para extorsionar al Indio con "Mancera S.C.", mas allá de eso prometí silencio, pero un día las contaré, mi pecho no es bodega de nadie. 

Los tres recuerdos del Xocoyote. La primer imagen que tengo de mi apá es cuando tenía cuatro años. Mientras yo dormía en un catre de lona, bajo la sombra de un mango, él me  espantaba los moscos aspaveando el aire con su sombrero ¿Como podría el candor de un niño olvidar esa escena?, ahí supe que me quería. El segundo recuerdo sucedió a mis cinco años, me llevó por primera vez a las tierras rumbo las Mamias, íbamos caminando, la primer parada fué en un árbol frente a la tierra de Jelipito el levantapesas. Arrancó unas espinas y las incrustó en su sombrero ¿Para qué son apá?, pregunté. "Ahora lo verás", me dijo. Yo conducía un carrito largo como de un metro, hecho de carrizo y alambre recocido, con volante y ruedas que él mismo me construyó ¡Iba hecho la mocha haciendo rrruuummm! Papá tenía cincuenta años y ambos avanzábamos lento, sin prisas ni asfalto. Tierra y silencio entre nosotros. Árboles y matorros a los lados, chirrr-chirrr de insectos, cú-cu de palomas. Creo que también papá llevaba un balero o un yo-yo, no estoy seguro. La segunda parada fue en el dren de la Reforma, donde se bajó con cuidado para arrancar un tule y ahí sucedió la magia. Mi más brillante recuerdo de ese día. Cortó un pedazo de tule de unos diez centímetros, lo torció tantito, tomó una espina de su sombrero y la encajó en el centro del tule ¡Me hizo una hélice y me dijo que era un avión! Fuí el niño mas feliz del mundo, sentía que volaba de verdad rugiendo: ¡ñññiieeoommm! , cuanto mas corría mas rápido giraba y mas alto volaba. Imaginaba que era una de esas avionetas que pasaban por el cielo galerístico y tiraban papeles. El carrito de carrizo ya no me importó. Ahí supe que lo quería. ¿Sería ese "tule-avión"  el preámbulo del "java-carro" del Lichalchito? Años después, viviendo en Cocorit, les hice avioncitos de tule a mis hijos y construí un carrito de carrizos. Aún los conservo. La tercer remembranza estuvo genial. Yo tenía seis años. Fué una teletransportación ¡El puente Einstein-Rosen si existe! Era de noche y estando en el patio de la casa, empezó a salir la luna en el horizonte, papá apuntó al cielo y me dijo: "Mira Topo, allá está el conejo de la Luna", yo volteé buscando el conejo pero no lo veía, antes que perdiera el interés me explicó: "¿Ves las orejas?, están arriba ahí mira, y abajo están las patas, ¿Lo ves?", "¡Siií!", contesté con asombro. Enseguida, embelesado y mirando el conejo sin parpadear, pregunté: ¿Papá, allá están los gringos?, "Sí", me dijo con ternura. Esa noche fué inolvidable. Ahí supe que la vida es una fantasía. No sé que pasó por mi cóbata, no conocía la taravisión ni había leído comics pulp fiction, aún no entraba a la escuela y faltaban dos años para que me apodaran el Pito. El auto mas grande que había visto era el carro jalado con caballos de los vecinos Ventura y Caciano, sus placas decían Tracción animal. El transporte más rápido donde me había subido era la carreta de Don Santos, que relinchaba a 10 kph por el Tábare-Galera-China, con  llantas "Goodyear" nalga de tigre, para que llegaran las conchas y cochitos calientitos ¿Acaso imaginé que yo volaba? ¿Doblé el espacio y viajé a velocidad warp a la Luna? Creo que por ese pasaje al Topo le gustó "Dune" y "Star Wars" ¡Te amo plan Zeta!, gritaba Plankton cuando creía que por fin, robaría la receta secreta de la Cangreburger.
                `
            }

        // Variables globales
        let currentChapterIndex = 0;

        // Elementos del DOM
        const chapterSelect = document.getElementById('chapter-select');
        const fontSizeSelect = document.getElementById('font-size');
        const themeSelect = document.getElementById('theme-select');
        const chapterContent = document.getElementById('chapter-content');
        const prevChapterBtn = document.getElementById('prev-chapter');
        const nextChapterBtn = document.getElementById('next-chapter');
        const chapterIndicator = document.getElementById('chapter-indicator');

        // Inicializar la aplicación
        function initApp() {
            populateChapterSelect();
            loadChapter(currentChapterIndex);
            updateChapterIndicator();
            
            // Event listeners
            chapterSelect.addEventListener('change', () => {
                currentChapterIndex = parseInt(chapterSelect.value);
                loadChapter(currentChapterIndex);
                updateChapterIndicator();
            });
            
            fontSizeSelect.addEventListener('change', () => {
                const sizeClass = fontSizeSelect.value;
                chapterContent.className = `reader-content ${sizeClass} slide-in`;
            });
            
            themeSelect.addEventListener('change', () => {
                toggleTheme(themeSelect.value === 'dark');
            });
            
            prevChapterBtn.addEventListener('click', () => {
                if (currentChapterIndex > 0) {
                    currentChapterIndex--;
                    loadChapter(currentChapterIndex);
                    chapterSelect.value = currentChapterIndex;
                    updateChapterIndicator();
                }
            });
            
            nextChapterBtn.addEventListener('click', () => {
                if (currentChapterIndex < chapters.length - 1) {
                    currentChapterIndex++;
                    loadChapter(currentChapterIndex);
                    chapterSelect.value = currentChapterIndex;
                    updateChapterIndicator();
                }
            });
        }

        // Llenar el selector de capítulos
        function populateChapterSelect() {
            chapters.forEach((chapter, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `CAP. ${index + 1}: ${chapter.title}`;
                chapterSelect.appendChild(option);
            });
        }

        // Cargar contenido del capítulo y formatear párrafos
        function loadChapter(index) {
            const chapter = chapters[index];
            
            // Dividir el contenido en párrafos y formatear
            const paragraphs = chapter.content.split('\n').filter(p => p.trim() !== '');
            let formattedContent = '';
            
            paragraphs.forEach(paragraph => {
                formattedContent += `<p class="paragraph">${paragraph.trim()}</p>`;
            });
            
            chapterContent.innerHTML = `
                <h2 class="text-2xl md:text-3xl font-bold text-primary mb-4 chapter-title">${chapter.title}</h2>
                <div>${formattedContent}</div>
            `;
            
            // Aplicar clase de animación
            chapterContent.classList.add('slide-in');
            setTimeout(() => {
                chapterContent.classList.remove('slide-in');
            }, 300);
        }

        // Actualizar indicador de capítulo
        function updateChapterIndicator() {
            chapterIndicator.textContent = `Capítulo ${currentChapterIndex + 1} de ${chapters.length}`;
        }

        // Alternar tema claro/oscuro
        function toggleTheme(dark) {
            if (dark) {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
        }

        // Iniciar la aplicación cuando se carga el DOM
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
