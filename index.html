<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensaje del Escritor</title>
  <!-- Tailwind CSS desde CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Animación fade-in */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeIn 1.2s ease-out forwards;
    }
    /* Animación bounce suave */
    @keyframes softBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .soft-bounce {
      animation: softBounce 2s infinite;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-pink-100 via-purple-100 to-indigo-100 flex items-center justify-center min-h-screen p-6 font-sans">
  <div class="text-center max-w-xl fade-in">
    <div class="bg-white shadow-lg rounded-xl p-8 border border-indigo-200">
      <p class="text-xl md:text-2xl font-semibold text-gray-800 leading-relaxed">
        El escritor está martillando palabras y soldando párrafos. ¡Pronto abrirá la puerta!
      </p>
      <div class="mt-6 soft-bounce">
        <span class="inline-block text-4xl">🔨📖</span>
      </div>
    </div>
  </div>
</body>
</html>
